<!DOCTYPE html>
<html>
<head>
    <title>Notebook</title>
</head>
<body>

<h1>Görev Takip Uygulaması</h1>

<!-- EKLEME FORMU -->
<form id="addForm">
    <input type="text" name="task" placeholder="Görev yaz..." required>
    <button type="submit">Ekle</button>
</form>

<ul id="taskList">
{% for t in tasks %}
    <li>
        {{ t }}
        <button onclick="deleteTask({{ loop.index0 }})">Sil</button>
    </li>
{% endfor %}
</ul>

<p>Toplam görev sayısı = <span id="counter">{{ toplam_gorev }}</span></p>

<script>
/*
🔥 EKLEME (AJAX)
*/
document.querySelector("#addForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const input = document.querySelector('input[name="task"]');
    const value = input.value;

    fetch("/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "task=" + encodeURIComponent(value)
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            // yeni eleman ekle
            const li = document.createElement("li");
            li.innerHTML = `
                ${data.task}
                <button onclick="deleteTask(${data.total - 1})">Sil</button>
            `;

            document.querySelector("#taskList").appendChild(li);

            // sayaç güncelle
            document.querySelector("#counter").textContent = data.total;

            // input temizle
            input.value = "";
        }
    });
});


/*
🔥 SİLME (AJAX)
*/
function deleteTask(index) {
    fetch("/delete", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "index=" + index
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            location.reload(); // şimdilik basit çözüm
        }
    });
}
</script>

</body>
</html>
